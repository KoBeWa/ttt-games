name: Sync Playoff Challenge Data

on:
  schedule:
    - cron: "10 5 * * *" # 06:10 Europe/Berlin (UTC cron)
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Sync pc_players
        id: sync_players
        run: node scripts/sync-pc-players.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Sync pc_weekly_stats (2025 POST)
        id: sync_stats
        run: node scripts/sync-pc-stats-2025.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Sync pc_team_weekly_stats (2025)
        id: sync_dst
        run: node scripts/sync-pc-team-stats-2025.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Sync pc_roster_weekly (2025)
        id: sync_roster
        run: node scripts/sync-pc-roster-weekly-2025.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Sync nflverse roster (2025)
        id: sync_nflverse
        run: node scripts/sync-nflverse-roster-2025.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Report failure
        if: failure()
        run: |
          echo "::error::One or more sync steps failed. Check the job logs above."
          echo "Failed steps summary:"
          echo "  sync_players: ${{ steps.sync_players.outcome }}"
          echo "  sync_stats:   ${{ steps.sync_stats.outcome }}"
          echo "  sync_dst:     ${{ steps.sync_dst.outcome }}"
          echo "  sync_roster:  ${{ steps.sync_roster.outcome }}"
          echo "  sync_nflverse: ${{ steps.sync_nflverse.outcome }}"
